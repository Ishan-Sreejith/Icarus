<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CoRe Language IDE</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #161a22;
        --panel-2: #1e2430;
        --text: #e6e6e6;
        --muted: #9aa3b2;
        --accent: #4aa3ff;
        --border: #2a3242;
        --terminal-bg: #0b0d12;
        --terminal-text: #d7f5dd;
        --button-bg: #2a5bd7;
        --button-text: #ffffff;
        --danger: #d74b4b;
        --font: "Georgia", "Times New Roman", serif;
        --mono: "Menlo", "Consolas", "Courier New", monospace;
        color-scheme: dark;
      }

      [data-theme="light"] {
        --bg: #f3f4f7;
        --panel: #ffffff;
        --panel-2: #f0f2f7;
        --text: #1f2328;
        --muted: #5b6472;
        --accent: #1f6feb;
        --border: #d0d7de;
        --terminal-bg: #0f1115;
        --terminal-text: #d7f5dd;
        --button-bg: #1f6feb;
        --button-text: #ffffff;
        --danger: #b42318;
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
      }

      .app {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: 52px 1fr;
        gap: 12px;
        height: 100vh;
        padding: 12px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        overflow: hidden;
      }

      .main {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .editor-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .editor-header .file-name {
        font-weight: 600;
      }

      .editor {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      textarea {
        flex: 1;
        width: 100%;
        resize: none;
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        font-family: var(--mono);
        font-size: 14px;
        line-height: 1.5;
      }

      .output {
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        min-height: 90px;
        font-family: var(--mono);
        font-size: 13px;
        white-space: pre-wrap;
      }

      .btn {
        background: var(--button-bg);
        color: var(--button-text);
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }

      .btn.secondary {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn.danger {
        background: var(--danger);
      }

      .label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .status {
        font-size: 12px;
        color: var(--muted);
      }

      .toolbar {
        background: linear-gradient(180deg, #1b202b 0%, #151922 100%);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .toolbar-left,
      .toolbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .title {
        font-weight: 600;
        letter-spacing: 0.3px;
      }

      .pill {
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(8, 10, 14, 0.6);
        z-index: 20;
      }

      .modal.open {
        display: flex;
      }

      .modal-card {
        width: min(620px, 92vw);
        max-height: 86vh;
        overflow: auto;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 12px;
      }

      .modal-title {
        font-size: 16px;
        font-weight: 600;
      }

      .modal-body {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .file-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        overflow-y: auto;
        max-height: 380px;
      }

      .file-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 6px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        cursor: pointer;
      }

      .file-item.active {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }

      .file-actions {
        display: flex;
        gap: 6px;
      }

      .settings-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      select,
      input[type="text"],
      input[type="number"] {
        width: 100%;
        padding: 6px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
      }

      .terminal {
        background: var(--terminal-bg);
        color: var(--terminal-text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        font-family: var(--mono);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .terminal-log {
        flex: 1;
        overflow-y: auto;
        font-size: 13px;
        line-height: 1.4;
        max-height: 260px;
      }

      .terminal input {
        width: 100%;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #0b0d12;
        color: var(--terminal-text);
        font-family: var(--mono);
      }

      @media (max-width: 1024px) {
        .app {
          grid-template-columns: 1fr;
          grid-template-rows: auto auto;
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="app" data-theme="dark" id="appRoot">
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="title">CoRe IDE</div>
          <div class="pill" id="engineStatus">Engine status: loading</div>
        </div>
        <div class="toolbar-right">
          <button class="btn secondary" id="openFilesBtn">Files</button>
          <button class="btn secondary" id="openTerminalBtn">Terminal</button>
          <button class="btn secondary" id="openSettingsBtn">Settings</button>
        </div>
      </div>

      <div class="panel main">
        <div class="editor-header">
          <div class="file-name" id="currentFileLabel">No file selected</div>
          <div style="display: flex; gap: 8px;">
            <button class="btn secondary" id="saveBtn">Save</button>
            <button class="btn" id="runBtn">Run</button>
          </div>
        </div>
        <div class="editor">
          <textarea id="codeEditor" spellcheck="false"></textarea>
          <div class="output" id="runOutput">Run output will appear here.</div>
        </div>
      </div>

      <div class="modal" id="filesModal">
        <div class="modal-card">
          <div class="modal-header">
            <div class="modal-title">File Manager</div>
            <button class="btn secondary" id="closeFilesBtn">Close</button>
          </div>
          <div class="modal-body">
            <div>
              <div class="label">Create file</div>
              <input type="text" id="newFileName" placeholder="new_file.fr" />
              <div style="display: flex; gap: 8px; margin-top: 8px;">
                <button class="btn" id="createFileBtn">Create</button>
                <button class="btn secondary" id="refreshFilesBtn">Refresh</button>
              </div>
            </div>
            <div>
              <div class="label">Files</div>
              <div class="file-list" id="fileList"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal" id="settingsModal">
        <div class="modal-card">
          <div class="modal-header">
            <div class="modal-title">Settings</div>
            <button class="btn secondary" id="closeSettingsBtn">Close</button>
          </div>
          <div class="modal-body">
            <div class="settings-group">
              <label>
                Theme
                <select id="themeSelect">
                  <option value="dark">Dark</option>
                  <option value="light">Light</option>
                </select>
              </label>
            </div>
            <div class="settings-group">
              <label>
                Editor font size
                <input type="number" id="fontSizeInput" min="12" max="22" value="14" />
              </label>
            </div>
            <div class="settings-group">
              <label>
                Engine preference
                <select id="engineSelect">
                  <option value="js">JavaScript engine (default)</option>
                  <option value="wasm">WebAssembly engine</option>
                </select>
              </label>
            </div>
            <div class="settings-group">
              <div class="label">Terminal commands</div>
              <div class="status">
                help, ls, cat &lt;file&gt;, run &lt;file&gt;, open &lt;file&gt;, touch &lt;file&gt;,
                rm &lt;file&gt;, mv &lt;old&gt; &lt;new&gt;, clear, core, metroman
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal" id="terminalModal">
        <div class="modal-card">
          <div class="modal-header">
            <div class="modal-title">Terminal</div>
            <button class="btn secondary" id="closeTerminalBtn">Close</button>
          </div>
          <div class="modal-body">
            <div class="terminal">
              <div class="terminal-log" id="terminalLog"></div>
              <input type="text" id="terminalInput" placeholder="Type a command and press Enter" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { CoReJsEngine } from "./core_js_engine.js";

      const appRoot = document.getElementById("appRoot");
      const fileList = document.getElementById("fileList");
      const editor = document.getElementById("codeEditor");
      const output = document.getElementById("runOutput");
      const currentFileLabel = document.getElementById("currentFileLabel");
      const engineStatus = document.getElementById("engineStatus");
      const terminalLog = document.getElementById("terminalLog");
      const terminalInput = document.getElementById("terminalInput");
      const themeSelect = document.getElementById("themeSelect");
      const fontSizeInput = document.getElementById("fontSizeInput");
      const engineSelect = document.getElementById("engineSelect");
      const filesModal = document.getElementById("filesModal");
      const settingsModal = document.getElementById("settingsModal");
      const terminalModal = document.getElementById("terminalModal");

      const jsEngine = new CoReJsEngine();
      let wasmCompiler = null;
      let wasmReady = false;
      const files = new Map();
      let currentFile = null;

      const settings = {
        theme: localStorage.getItem("core_theme") || "dark",
        fontSize: Number(localStorage.getItem("core_font_size") || 14),
        engine: localStorage.getItem("core_engine") || "js",
      };

      function logTerminal(message) {
        const line = document.createElement("div");
        line.textContent = message;
        terminalLog.appendChild(line);
        terminalLog.scrollTop = terminalLog.scrollHeight;
      }

      function setStatus() {
        const wasmText = wasmReady ? "WASM ready" : "WASM not ready";
        engineStatus.textContent = `Engine status: JS ready, ${wasmText}`;
      }

      function applySettings() {
        appRoot.setAttribute("data-theme", settings.theme);
        editor.style.fontSize = `${settings.fontSize}px`;
        themeSelect.value = settings.theme;
        fontSizeInput.value = settings.fontSize;
        engineSelect.value = settings.engine;
      }

      function saveSettings() {
        localStorage.setItem("core_theme", settings.theme);
        localStorage.setItem("core_font_size", String(settings.fontSize));
        localStorage.setItem("core_engine", settings.engine);
      }

      function listFiles() {
        const names = Array.from(files.keys()).sort();
        fileList.innerHTML = "";
        for (const name of names) {
          const row = document.createElement("div");
          row.className = "file-item" + (name === currentFile ? " active" : "");

          const label = document.createElement("div");
          label.textContent = name;
          label.style.flex = "1";
          label.onclick = () => openFile(name);

          const actions = document.createElement("div");
          actions.className = "file-actions";

          const renameBtn = document.createElement("button");
          renameBtn.className = "btn secondary";
          renameBtn.textContent = "Rename";
          renameBtn.onclick = (e) => {
            e.stopPropagation();
            renameFile(name);
          };

          const deleteBtn = document.createElement("button");
          deleteBtn.className = "btn danger";
          deleteBtn.textContent = "Delete";
          deleteBtn.onclick = (e) => {
            e.stopPropagation();
            deleteFile(name);
          };

          actions.append(renameBtn, deleteBtn);
          row.append(label, actions);
          fileList.appendChild(row);
        }
      }

      function syncToWasm(name) {
        if (!wasmReady) return;
        const content = files.get(name);
        wasmCompiler.save_file(name, content || "");
      }

      function syncAllToWasm() {
        if (!wasmReady) return;
        for (const [name, content] of files.entries()) {
          wasmCompiler.save_file(name, content);
        }
      }

      function openFile(name) {
        if (!files.has(name)) return;
        currentFile = name;
        editor.value = files.get(name);
        currentFileLabel.textContent = name;
        listFiles();
      }

      function createFile(name, content) {
        if (!name) return;
        if (!name.endsWith(".fr")) {
          alert("Files must end with .fr");
          return;
        }
        if (files.has(name)) {
          alert("File already exists");
          return;
        }
        files.set(name, content || "");
        syncToWasm(name);
        listFiles();
        openFile(name);
      }

      function renameFile(oldName) {
        const newName = prompt("Rename file to:", oldName);
        if (!newName || newName === oldName) return;
        if (!newName.endsWith(".fr")) {
          alert("Files must end with .fr");
          return;
        }
        if (files.has(newName)) {
          alert("File already exists");
          return;
        }
        const content = files.get(oldName) || "";
        files.delete(oldName);
        files.set(newName, content);
        if (wasmReady) {
          wasmCompiler.delete_file(oldName);
          wasmCompiler.save_file(newName, content);
        }
        if (currentFile === oldName) {
          currentFile = newName;
          currentFileLabel.textContent = newName;
        }
        listFiles();
      }

      function deleteFile(name) {
        if (!confirm(`Delete ${name}?`)) return;
        files.delete(name);
        if (wasmReady) {
          wasmCompiler.delete_file(name);
        }
        if (currentFile === name) {
          currentFile = null;
          editor.value = "";
          currentFileLabel.textContent = "No file selected";
        }
        listFiles();
      }

      function saveCurrent() {
        if (!currentFile) {
          alert("No file selected");
          return;
        }
        files.set(currentFile, editor.value);
        syncToWasm(currentFile);
        listFiles();
      }

      function runCurrent() {
        if (!currentFile) {
          output.textContent = "No file selected.";
          return;
        }
        saveCurrent();
        try {
          if (settings.engine === "wasm" && wasmReady) {
            const out = wasmCompiler.execute(currentFile);
            output.textContent = out || "Program executed successfully";
          } else {
            const out = jsEngine.execute(files.get(currentFile) || "");
            output.textContent = out || "Program executed successfully";
          }
        } catch (err) {
          output.textContent = `Error: ${err.message}`;
        }
      }

      function handleCommand(input) {
        const trimmed = input.trim();
        if (!trimmed) return;
        logTerminal(`$ ${trimmed}`);
        const parts = trimmed.split(/\s+/);
        const cmd = parts[0];
        const args = parts.slice(1);

        if (cmd === "clear") {
          terminalLog.innerHTML = "";
          return;
        }

        if (cmd === "help") {
          logTerminal("Commands: help, ls, cat <file>, open <file>, run <file>, touch <file>, rm <file>, mv <old> <new>, clear, core, metroman");
          return;
        }

        if (cmd === "ls") {
          logTerminal(Array.from(files.keys()).sort().join("  ") || "(no files)");
          return;
        }

        if (cmd === "cat") {
          const name = args[0];
          if (!name || !files.has(name)) {
            logTerminal("File not found.");
            return;
          }
          logTerminal(files.get(name));
          return;
        }

        if (cmd === "open") {
          const name = args[0];
          if (!name || !files.has(name)) {
            logTerminal("File not found.");
            return;
          }
          openFile(name);
          return;
        }

        if (cmd === "touch") {
          const name = args[0];
          if (!name) {
            logTerminal("Usage: touch <file>");
            return;
          }
          createFile(name, "");
          return;
        }

        if (cmd === "rm") {
          const name = args[0];
          if (!name || !files.has(name)) {
            logTerminal("File not found.");
            return;
          }
          files.delete(name);
          if (wasmReady) wasmCompiler.delete_file(name);
          if (currentFile === name) {
            currentFile = null;
            editor.value = "";
            currentFileLabel.textContent = "No file selected";
          }
          listFiles();
          logTerminal(`Deleted ${name}`);
          return;
        }

        if (cmd === "mv") {
          const [oldName, newName] = args;
          if (!oldName || !newName) {
            logTerminal("Usage: mv <old> <new>");
            return;
          }
          if (!files.has(oldName)) {
            logTerminal("File not found.");
            return;
          }
          if (files.has(newName)) {
            logTerminal("Target file already exists.");
            return;
          }
          const content = files.get(oldName);
          files.delete(oldName);
          files.set(newName, content);
          if (wasmReady) {
            wasmCompiler.delete_file(oldName);
            wasmCompiler.save_file(newName, content);
          }
          if (currentFile === oldName) {
            currentFile = newName;
            currentFileLabel.textContent = newName;
          }
          listFiles();
          logTerminal(`Renamed ${oldName} -> ${newName}`);
          return;
        }

        if (cmd === "run") {
          const name = args[0] || currentFile;
          if (!name || !files.has(name)) {
            logTerminal("File not found.");
            return;
          }
          currentFile = name;
          editor.value = files.get(name);
          currentFileLabel.textContent = name;
          runCurrent();
          logTerminal("Executed.");
          return;
        }

        if (cmd === "core" || cmd === "metroman") {
          if (!wasmReady) {
            logTerminal("WASM engine not available. Command requires WASM.");
            return;
          }
          syncAllToWasm();
          const res = wasmCompiler.execute_command(trimmed);
          logTerminal(res || "(no output)");
          return;
        }

        logTerminal("Unknown command. Type help.");
      }

      async function initWasm() {
        try {
          const mod = await import("./pkg/core_wasm.js");
          await mod.default();
          const { CoreCompilerWasm } = await import("./pkg/core_wasm.js");
          wasmCompiler = new CoreCompilerWasm();
          wasmReady = true;
          syncAllToWasm();
          setStatus();
        } catch (err) {
          wasmReady = false;
          setStatus();
          logTerminal(`WASM init failed: ${err.message}`);
        }
      }

      document.getElementById("createFileBtn").onclick = () => {
        const name = document.getElementById("newFileName").value.trim();
        createFile(name, "");
        document.getElementById("newFileName").value = "";
      };

      document.getElementById("refreshFilesBtn").onclick = () => listFiles();
      document.getElementById("saveBtn").onclick = saveCurrent;
      document.getElementById("runBtn").onclick = runCurrent;
      document.getElementById("openFilesBtn").onclick = () => filesModal.classList.add("open");
      document.getElementById("closeFilesBtn").onclick = () => filesModal.classList.remove("open");
      document.getElementById("openSettingsBtn").onclick = () => settingsModal.classList.add("open");
      document.getElementById("closeSettingsBtn").onclick = () => settingsModal.classList.remove("open");
      document.getElementById("openTerminalBtn").onclick = () => terminalModal.classList.add("open");
      document.getElementById("closeTerminalBtn").onclick = () => terminalModal.classList.remove("open");

      terminalInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          handleCommand(terminalInput.value);
          terminalInput.value = "";
        }
      });

      themeSelect.addEventListener("change", () => {
        settings.theme = themeSelect.value;
        applySettings();
        saveSettings();
      });

      fontSizeInput.addEventListener("change", () => {
        settings.fontSize = Number(fontSizeInput.value);
        applySettings();
        saveSettings();
      });

      engineSelect.addEventListener("change", () => {
        settings.engine = engineSelect.value;
        saveSettings();
      });

      function bootstrap() {
        applySettings();
        const sample = jsEngine.get_sample_code();
        createFile("main.fr", sample);
        openFile("main.fr");
        logTerminal("CoRe IDE ready. Type help for commands.");
        setStatus();
        initWasm();
      }

      bootstrap();
    </script>
  </body>
</html>
